<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Team Clash Admin</title><link rel="stylesheet" href="styles.css"></head><body class="admin-body"><header class="top"><a class="brand" href="index.html"><span class="basket">◎</span><span><b>TEAM CLASH ADMIN</b><small>NO-CODE STORY EDITOR</small></span></a><a class="btn ghost" href="index.html">View site</a></header><main class="admin-wrap"><section class="editor card"><h1>Create a post</h1><label>Headline<input id="title" placeholder="Match 5: Everything Is on the Line"></label><label>Short summary<textarea id="summary" rows="3"></textarea></label><label>Story<textarea id="body" rows="10"></textarea></label><div class="two"><label>Category<select id="category"><option>Match Preview</option><option>Match Recap</option><option>League News</option><option>Photo Story</option></select></label><label>Date<input id="date" type="date"></label></div><label>Photo URL<input id="image" placeholder="Paste image URL"></label><label>Or choose photo<input id="upload" type="file" accept="image/*"></label><label>Related link<input id="link" placeholder="https://..."></label><div class="actions"><button class="btn" id="save">Save draft</button><button class="btn ghost" id="download">Download post</button><button class="btn ghost" id="importBtn">Import posts</button><input id="importFile" type="file" accept="application/json" hidden></div><p class="note">Drafts save in this browser. Download/import keeps a backup without subscriptions.</p></section><section class="preview card"><span class="eyebrow" id="pCat">MATCH PREVIEW</span><div class="preview-img" id="pImg"></div><h2 id="pTitle">Your headline appears here</h2><p id="pSummary">Your summary appears here.</p><div id="pBody"></div></section></main><script src="admin.js"></script></body></html>
